name: Drest Selenium Tests - Nightly

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run Selenium Tests
        run: mvn clean test -Dheadless=true
        continue-on-error: true

      - name: Generate Allure Report
        run: mvn allure:report
        continue-on-error: true

      - name: Upload Allure Report
        uses: actions/upload-artifact@v3
        with:
          name: allure-report
          path: target/allure-report/

      - name: Send Email Report
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Rapport Tests Drest.tn - Run ${{ github.run_number }}"
          to: benrhouma.samar44@gmail.com
          from: benrhouma.samar44@gmail.com
          body: |
            Bonjour Samar,

            Les tests automatisés Drest.tn viennent de se terminer.

            Voir le rapport complet ici :
            https://github.com/SamarBenRhouma-esprit/drest-selenium-tests/actions/runs/${{ github.run_id }}

            Cordialement,
            GitHub Actionsgit add .
