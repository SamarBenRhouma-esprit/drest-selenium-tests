name: Drest Selenium Tests - Nightly

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run Selenium Tests
        run: mvn clean test -Dheadless=true
        continue-on-error: true

      - name: Generate Allure Report
        run: mvn allure:report
        continue-on-error: true

      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: target/allure-report
          publish_branch: gh-pages

      - name: Send Email with Resend
        run: |
          curl -X POST 'https://api.resend.com/emails' \
            -H 'Authorization: Bearer ${{ secrets.RESEND_API_KEY }}' \
            -H 'Content-Type: application/json' \
            -d '{
              "from": "onboarding@resend.dev",
              "to": ["samar.benrhouma@esprit.tn"],
              "subject": "Rapport Tests Drest.tn - Run ${{ github.run_number }}",
              "html": "<h2>Tests Automatises Drest.tn</h2><p>Les tests viennent de se terminer.</p><p><strong><a href=\"https://SamarBenRhouma-esprit.github.io/drest-selenium-tests/\">Cliquer ici pour voir le rapport Allure</a></strong></p><p>Run: ${{ github.run_number }} | Date: ${{ github.event.head_commit.timestamp }}</p>"
            }'