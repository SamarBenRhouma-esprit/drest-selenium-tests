name: Drest Selenium Tests - Nightly

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run Selenium Tests
        run: mvn clean test -Dheadless=true
        continue-on-error: true

      - name: Generate Allure Report
        run: mvn allure:report
        continue-on-error: true

      - name: Upload Allure Report
        uses: actions/upload-artifact@v3
        with:
          name: allure-report
          path: target/allure-report/

      - name: Send Email with Resend
        run: |
          curl -X POST 'https://api.resend.com/emails' \
            -H 'Authorization: Bearer ${{ secrets.RESEND_API_KEY }}' \
            -H 'Content-Type: application/json' \
            -d '{
              "from": "onboarding@resend.dev",
              "to": ["benrhouma.samar44@gmail.com"],
              "subject": "Rapport Tests Drest.tn - Run ${{ github.run_number }}",
              "html": "<h2>Tests Automatisés Drest.tn</h2><p>Les tests viennent de se terminer.</p><p><a href=\"https://github.com/SamarBenRhouma-esprit/drest-selenium-tests/actions/runs/${{ github.run_id }}\">Voir le rapport complet</a></p>"
            }'